<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Thuyết Trình Đồ Án - Smart Transport Management</title>
    <style>
        body, html {
            margin: 0; padding: 0;
            width: 100%; height: 100%;
            overflow: hidden;
            background-color: #1a1a1a;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        /* Khung chứa các iframe để xử lý hiệu ứng dịch chuyển */
        .slide-wrapper {
            position: relative;
            width: 100%;
            height: 100%;
            overflow: hidden;
        }

        /* Định dạng chung cho cả 2 iframe trình chiếu */
        .slide-frame {
            position: absolute;
            top: 0; left: 0;
            width: 100%; height: 100%;
            border: none;
            background-color: #fff;
            transition: transform 0.6s cubic-bezier(0.25, 1, 0.5, 1), opacity 0.5s ease;
            z-index: 1;
        }

        /* Các Class trạng thái hiệu ứng động */
        .frame-center {
            transform: translateX(0);
            opacity: 1;
            z-index: 2; /* Đưa khung đang xem lên trên cùng */
        }
        .frame-right {
            transform: translateX(100%);
            opacity: 0;
        }
        .frame-left {
            transform: translateX(-100%);
            opacity: 0;
        }
        .frame-fade-out {
            opacity: 0;
            transition: opacity 0.4s ease;
        }

        .controls {
            position: fixed; bottom: 20px; left: 50%;
            transform: translateX(-50%);
            background: rgba(20, 20, 20, 0.85);
            padding: 10px 25px; border-radius: 30px;
            color: #fff; font-size: 13px;
            border: 1px solid rgba(255,255,255,0.15);
            z-index: 1000;
            box-shadow: 0 4px 15px rgba(0,0,0,0.5);
            backdrop-filter: blur(5px);
            pointer-events: none;
            white-space: nowrap;
        }

        .controls b { color: #00d4ff; margin-left: 10px; }

        .slide-number {
            position: fixed; top: 15px; right: 20px;
            background: rgba(0,0,0,0.6); padding: 6px 15px;
            border-radius: 20px; color: #00d4ff; 
            font-weight: bold; font-size: 14px;
            z-index: 1001;
            border: 1px solid rgba(0, 212, 255, 0.3);
        }

        /* Thanh tiến trình ở trên cùng */
        #progress-bar {
            position: fixed; top: 0; left: 0;
            height: 4px; background: #00d4ff;
            width: 0%; transition: width 0.3s ease;
            z-index: 1002;
        }
    </style>
</head>
<body>

    <div id="progress-bar"></div>
    <div id="status" class="slide-number">Đang tải...</div>
    
    <div class="slide-wrapper">
        <iframe id="slide-frame-1" class="slide-frame frame-center" src="PPThuyetTrinh.html"></iframe>
        <iframe id="slide-frame-2" class="slide-frame frame-right" src=""></iframe>
    </div>
    
    <script>
        const slides = [
            "PPThuyetTrinh.html", "2_slide_BoCuBaoCao.html","1_slide_LyDo.html","3_slide_gioithieuduan.html",
             "4_slide_usecase_TQ.html", 
           
            "9_silde_ThietKeDuLieu.html", "10_slide_CaiDat.html", "11_slide_kiemThu01.html",
            "12_slide_kiemThu02.html", "13_slide_kiemThu03.html", "14_slide_Kiemthu_04.html","15_slide_KienNghi.html","16_slide_KetThuc.html"
        ];

        let currentIndex = 0;
        const frames = [
            document.getElementById('slide-frame-1'),
            document.getElementById('slide-frame-2')
        ];
        let activeFrameIndex = 0; // Thẻ iframe nào đang hiển thị chính

        const status = document.getElementById('status');
        const progressBar = document.getElementById('progress-bar');

        function activateFullscreen() {
            if (!document.fullscreenElement) {
                document.documentElement.requestFullscreen().catch(err => {
                    console.log("Chờ tương tác từ người dùng để mở toàn màn hình.");
                });
            }
        }

        function updateSlide(index, direction = "next") {
            if (index < 0 || index >= slides.length || index === currentIndex) return;

            currentIndex = index;

            // Xác định iframe hiện tại (gốc) và iframe tiếp theo (đích)
            const currentFrame = frames[activeFrameIndex];
            activeFrameIndex = (activeFrameIndex + 1) % 2;
            const nextFrame = frames[activeFrameIndex];

            // 1. Đặt trước vị trí xuất phát cho slide mới dựa trên hướng di chuyển
            nextFrame.className = "slide-frame"; // Reset class bám đuôi cũ
            if (direction === "next") {
                nextFrame.classList.add("frame-right");
            } else if (direction === "prev") {
                nextFrame.classList.add("frame-left");
            } else {
                nextFrame.classList.add("frame-fade-out"); // Nếu nhảy trang qua menu, cho mờ dần
            }

            // 2. Gán link trang mới cho iframe ẩn
            nextFrame.src = slides[currentIndex];

            // Đợi iframe mới tải xong nội dung thiết lập các tính năng liên kết
            nextFrame.onload = function() {
                setupIframeEvents(nextFrame);
                
                // Kích hoạt hiệu ứng tịnh tiến mượt bằng CSS
                setTimeout(() => {
                    if (direction === "next") {
                        currentFrame.className = "slide-frame frame-left";
                        nextFrame.className = "slide-frame frame-center";
                    } else if (direction === "prev") {
                        currentFrame.className = "slide-frame frame-right";
                        nextFrame.className = "slide-frame frame-center";
                    } else {
                        currentFrame.className = "slide-frame frame-fade-out";
                        nextFrame.className = "slide-frame frame-center";
                    }
                }, 30);
            };

            // Cập nhật thanh tiến trình và số hiệu slide
            const progress = ((currentIndex + 1) / slides.length) * 100;
            progressBar.style.width = progress + "%";
            status.innerText = `Slide ${currentIndex + 1} / ${slides.length}`;
        }

        const handleKeyDown = (e) => {
            const key = e.key;
            activateFullscreen();

            if (key.toLowerCase() === "f") {
                e.preventDefault();
                if (!document.fullscreenElement) {
                    document.documentElement.requestFullscreen();
                } else {
                    document.exitFullscreen();
                }
            }
            
            // Điều hướng chính kèm theo truyền biến hướng di chuyển (next / prev)
            if (key === "Home") { e.preventDefault(); updateSlide(0, "fade"); }
            else if (key === "End") { e.preventDefault(); updateSlide(slides.length - 1, "fade"); }
            else if (["ArrowRight", " ", "PageDown"].includes(key)) {
                e.preventDefault();
                if (currentIndex < slides.length - 1) updateSlide(currentIndex + 1, "next");
            }
            else if (["ArrowLeft", "PageUp", "Backspace"].includes(key)) {
                e.preventDefault();
                if (currentIndex > 0) updateSlide(currentIndex - 1, "prev");
            }
            else if (key.toLowerCase() === "r") {
                e.preventDefault();
                frames[activeFrameIndex].src = slides[currentIndex];
            }
        };

        window.addEventListener('keydown', handleKeyDown);
        window.addEventListener('click', activateFullscreen);

        // Đóng gói hàm xử lý đồng bộ sự kiện để dùng chung cho cả 2 iframe thay phiên nhau
        function setupIframeEvents(iframe) {
            try {
                const innerWin = iframe.contentWindow;

                innerWin.addEventListener('keydown', handleKeyDown);

                innerWin.addEventListener('mousedown', function(e) {
                    activateFullscreen();
                    if (!["BUTTON", "A", "INPUT", "SELECT"].includes(e.target.tagName)) {
                        setTimeout(() => { window.focus(); }, 10);
                    }
                });

                innerWin.onerror = function() { return true; };

                if (innerWin.adjustLayout) {
                    const originalFunc = innerWin.adjustLayout;
                    innerWin.adjustLayout = function() {
                        try { originalFunc(); } catch (e) { console.warn("Layout fix applied."); }
                    };
                }
            } catch (err) {
                console.warn("Mẹo: Hãy chạy bằng Live Server (VS Code) để hiệu ứng không bị giới hạn bảo mật.");
            }
        }

        // Khởi tạo cài đặt cho iframe đầu tiên lúc mở trang
        document.getElementById('slide-frame-1').onload = function() {
            setupIframeEvents(this);
            const progress = (1 / slides.length) * 100;
            progressBar.style.width = progress + "%";
            status.innerText = `Slide 1 / ${slides.length}`;
        };

        window.focus();

        // Đón nhận tín hiệu đổi slide được kích hoạt từ menu nhảy trang bên trong các slide con
        window.addEventListener('message', function(event) {
            if (event.data.type === 'keydown') {
                const fakeEvent = {
                    key: event.data.key,
                    preventDefault: () => {} 
                };
                handleKeyDown(fakeEvent);
            } else if (event.data.type === 'navigate') {
                // Nếu slide con gửi yêu cầu nhảy slide chỉ định (dựa vào tên file)
                const targetIndex = slides.indexOf(event.data.slideName);
                if (targetIndex !== -1) {
                    updateSlide(targetIndex, "fade");
                }
            }
        });
        
    </script>
</body>
</html>
